<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software Development Company — Luiz Pureza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --silver:#c8c8c8;
  --silver-bright:#efefef;
  --bg:#06060a;
}

html,body{
  height:100%;
  background:var(--bg);
  color:white;
  font-family:'Montserrat',sans-serif;
  overflow:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.032;
  pointer-events:none;
  z-index:0;
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  background:radial-gradient(ellipse 65% 50% at 50% 52%, rgba(180,180,200,0.05) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
}

.grid{
  position:fixed;
  inset:0;
  z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 75% 75% at 50% 50%,black 20%,transparent 100%);
}

.wrap{
  position:relative;
  z-index:1;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px 20px 16px;
}

.brand{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
  margin-bottom:18px;
}

.brand-eyebrow{
  font-size:8px;
  letter-spacing:5px;
  color:#383838;
  font-weight:300;
}

.brand-name{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(20px,3vw,32px);
  font-weight:300;
  letter-spacing:7px;
  color:var(--silver-bright);
  line-height:1;
}

.brand-rule{
  width:36px;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,200,200,0.4),transparent);
  margin:3px 0;
}

.brand-tagline{
  font-size:7.5px;
  letter-spacing:4px;
  color:#2e2e2e;
  font-weight:300;
}

.scene{
  width:min(86vw,540px);
  aspect-ratio:1.586/1;
  position:relative;
}

.card{
  position:relative;
  width:100%;
  height:100%;
  cursor:pointer;
  filter:drop-shadow(0 28px 55px rgba(0,0,0,.85)) drop-shadow(0 0 35px rgba(160,160,180,.06));
}

.card img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  border-radius:22px;
}

.overlay{
  position:absolute;
  inset:0;
  z-index:5;
  display:none;
}

.overlay.active{
  display:block;
}

.tap{
  position:absolute;
  display:block;
  border-radius:6px;
}

.tap-phone{left:19%;top:37%;width:32%;height:10%;}
.tap-email{left:19%;top:48%;width:40%;height:10%;}
.tap-save{left:19%;top:68%;width:44%;height:11%;}

.hint{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:14px;
  opacity:0.45;
}

.hint-line{
  width:24px;
  height:1px;
  background:rgba(255,255,255,0.2);
}

.hint-text{
  font-size:7.5px;
  letter-spacing:4px;
  color:#555;
  font-weight:300;
}

.cta-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:16px;
}

.cta{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:9px 22px;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:2px;
  font-size:8px;
  letter-spacing:3.5px;
  color:var(--silver);
  text-decoration:none;
  font-weight:400;
  background:rgba(255,255,255,0.03);
  transition:all .3s ease;
  backdrop-filter:blur(4px);
  white-space:nowrap;
}

.cta-divider{
  width:1px;
  height:24px;
  background:rgba(255,255,255,0.1);
}

@media(max-width:480px){
  .brand-name{font-size:18px;letter-spacing:5px;}
  .brand{margin-bottom:12px;}
  .scene{width:94vw;}
  .hint,.cta-row{margin-top:10px;}
  .cta{padding:8px 15px;font-size:7.5px;}
}
</style>
</head>
<body>

<div class="grid"></div>

<div class="wrap">

  <div class="brand">
    <span class="brand-eyebrow">HAVANT, UK</span>
    <h1 class="brand-name">SOFTWARE DEV CO</h1>
    <div class="brand-rule"></div>
    <span class="brand-tagline">WE BUILD WHAT'S NEXT</span>
  </div>

  <div class="scene">
    <div class="card" id="card">
      <img id="cardImage" src="front.png" alt="Business Card">

      <div class="overlay" id="backOverlay">
        <a class="tap tap-phone" href="https://wa.me/447375074911" target="_blank" aria-label="WhatsApp"></a>
        <a class="tap tap-email" href="mailto:contact@softwaredevco.co.uk" aria-label="Email"></a>
        <a class="tap tap-save" href="softwaredevco.vcf" download aria-label="Save Contact"></a>
      </div>
    </div>
  </div>

  <div class="hint">
    <div class="hint-line"></div>
    <span class="hint-text">TAP CARD TO FLIP</span>
    <div class="hint-line"></div>
  </div>

  <div class="cta-row">
    <a class="cta" href="https://wa.me/447375074911" target="_blank">WHATSAPP</a>
    <div class="cta-divider"></div>
    <a class="cta" href="mailto:contact@softwaredevco.co.uk">EMAIL</a>
  </div>

</div>

<script>
const card = document.getElementById("card");
const cardImage = document.getElementById("cardImage");
const backOverlay = document.getElementById("backOverlay");

let showingFront = true;

card.addEventListener("click", function(e) {
  if (e.target.tagName.toLowerCase() === "a") return;

  if (showingFront) {
    cardImage.src = "back.png";
    backOverlay.classList.add("active");
    showingFront = false;
  } else {
    cardImage.src = "front.png";
    backOverlay.classList.remove("active");
    showingFront = true;
  }
});
</script>

</body>
</html>
